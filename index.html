<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Te tocara adivinar la contraseña</title>
    <link rel="stylesheet" href="style.css">
    <style type="text/css">
    	* {
		  margin: 0;
		  padding: 0;
		  box-sizing: border-box;
		}

		body {
		  font-family: arial;
		  background-image: url('https://www.dropbox.com/scl/fi/t2jl3f9h5v8d7mmfxs8ei/gatitos.jpeg?rlkey=1pkz085e30qncuewsqpbohdpi&st=in314mjh&raw=1');
		  background-size: cover;
		  background-position: center;
		  background-attachment: fixed;
		}


		.form-login {
		  width: 400px;
		  height: 340px;
		  background: #4e4d4d;
		  margin: auto;
		  margin-top: 180px;
		  box-shadow: 7px 13px 37px #000;
		  padding: 20px 30px;
		  border-top: 4px solid #017bab;
		  color: white;
		}

		.form-login h5 {
		  margin: 0;
		  text-align: center;
		  margin-bottom: 20px;
		  height: 50px;
		  margin-bottom: 30px;
		  border-bottom: 1px solid;
		  font-size: 20px;
		}

		.controls {
		  width: 100%;
		  color: white;
		  border: 1px solid #017bab;
		  margin-bottom: 15px;
		  padding: 11px 10px;
		  background: #252323;
		  font-size: 14px;
		  font-weight: bold;
		}

		.buttons {
		  width: 100%;
		  height: 40px;
		  border-radius: 15px;
		  margin-bottom: 15px;
		  background-color: #017bab;
		  color: white;
		  font-size: 16px;
		  font-weight: bold;
		  border: none;
		  cursor: pointer;
		  transition: background 0.3s ease, transform 0.2s ease;
		}

		.buttons:hover {
		  background-color: #015f87; /* Color más oscuro al pasar el mouse */
		  transform: scale(1.05); /* Hace que el botón crezca un poco */
		}

		.form-login p{
		  height: 40px;
		  text-align: center;
		  border-bottom: 1px solid;
		}

    </style>
    <script type="text/javascript">
      function Validar() {
        var usuario = document.querySelector("input[name='usuario']").value;
        var contrasena = document.querySelector("input[name='contrasena']").value;
        
        if (usuario == "PATITO" && contrasena == "PALIDO") {
          alert("¡Acceso permitido!");
          window.location.href = "pagina_destino.html";
        } else {
          alert("Usuario o contraseña incorrectos.");
        }
      }
    </script>
  </head>
  <body>
    <section class="form-login">
      <h5>Confío en que no tardarás mucho en saber la contraseña</h5>
      <input class="controls" type="text" name="usuario" value="" placeholder="Usuario">
      <input class="controls" type="password" name="contrasena" value="" placeholder="Contraseña">
      <button class="buttons" type="button" onclick="Validar()">Ingresar</button>
      <p><a>Cada regalito será una pista</a></p>
    </section>
  </body>
</html>
